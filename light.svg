<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 610" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F1F5F9" />
    </linearGradient>
    <linearGradient id="panel-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.7" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="50%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>
    <linearGradient id="ascii-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <linearGradient id="border-shimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F2342" stop-opacity="0.05" />
      <stop offset="50%" stop-color="#2563EB" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0F2342" stop-opacity="0.02" />
    </linearGradient>
    <filter id="glow-strong" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <style>
      .font-sans { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Helvetica, Arial, sans-serif; }
      .font-mono { font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Fira Code, monospace; }
      .pill { fill: #F1F5F9; stroke: rgba(15,23,42,0.08); stroke-width: 1; }
    </style>
  </defs>

  <rect width="1180" height="610" fill="url(#bg-grad)" rx="24" />
  <circle cx="200" cy="200" r="280" fill="#2563EB" opacity="0.05" filter="url(#glow-strong)">
    <animate attributeName="transform" type="translate" values="0,0; 15,-15; 0,0" dur="8s" repeatCount="indefinite" />
  </circle>
  <circle cx="950" cy="450" r="320" fill="#06B6D4" opacity="0.04" filter="url(#glow-strong)">
    <animate attributeName="transform" type="translate" values="0,0; -15,15; 0,0" dur="10s" repeatCount="indefinite" />
  </circle>
  <rect x="1" y="1" width="1178" height="608" fill="none" stroke="url(#border-shimmer)" stroke-width="1.5" rx="23" />

  <line x1="0" y1="0" x2="1180" y2="0" stroke="rgba(37, 99, 235, 0.02)" stroke-width="3">
    <animate attributeName="y1" values="0; 610" dur="7s" repeatCount="indefinite" />
    <animate attributeName="y2" values="0; 610" dur="7s" repeatCount="indefinite" />
  </line>

  <!-- LEFT SIDE: ASCII ART PORTRAIT -->
  <g transform="translate(60, 0)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-8; 0,0" dur="6s" repeatCount="indefinite" />
      <rect x="20" y="120" width="360" height="360" fill="url(#ascii-grad)" opacity="0.03" filter="url(#glow-strong)" rx="20"/>
      <g class="font-mono" font-size="14" font-weight="700" fill="url(#ascii-grad)">
        <text x="30" y="150" opacity="0"> AGCCTTGCAATCGATCGATTCGAT <animate attributeName="opacity" to="1" begin="0.1s" dur="0.4s" fill="freeze"/></text>
        <text x="30" y="175" opacity="0">      Status: SEQUENCING...      <animate attributeName="opacity" to="1" begin="0.3s" dur="0.4s" fill="freeze"/></text>
        <text x="30" y="205" opacity="0">     :::     _______     :::     <animate attributeName="opacity" to="1" begin="0.5s" dur="0.4s" fill="freeze"/></text>
        <text x="30" y="230" opacity="0">         /        \            <animate attributeName="opacity" to="1" begin="0.7s" dur="0.4s" fill="freeze"/></text>
        <text x="30" y="255" opacity="0">    ====(--J.KIM--)====        <animate attributeName="opacity" to="1" begin="0.9s" dur="0.4s" fill="freeze"/></text>
        <text x="30" y="280" opacity="0">         \________/            <animate attributeName="opacity" to="1" begin="1.1s" dur="0.4s" fill="freeze"/></text>
        <text x="30" y="305" opacity="0">         /        \            <animate attributeName="opacity" to="1" begin="1.3s" dur="0.4s" fill="freeze"/></text>
        <text x="30" y="330" opacity="0">    ====(--CORE---)====        <animate attributeName="opacity" to="1" begin="1.5s" dur="0.4s" fill="freeze"/></text>
        <text x="30" y="355" opacity="0">         \________/            <animate attributeName="opacity" to="1" begin="1.7s" dur="0.4s" fill="freeze"/></text>
        <text x="30" y="380" opacity="0">         /        \            <animate attributeName="opacity" to="1" begin="1.9s" dur="0.4s" fill="freeze"/></text>
        <text x="30" y="405" opacity="0">    ====(--INIT---)====        <animate attributeName="opacity" to="1" begin="2.1s" dur="0.4s" fill="freeze"/></text>
        <text x="30" y="430" opacity="0">     :::   \________/    :::     <animate attributeName="opacity" to="1" begin="2.3s" dur="0.4s" fill="freeze"/></text>
        <text x="30" y="455" opacity="0">       SYS.LOC :: 127.0.0.1    <animate attributeName="opacity" to="1" begin="2.5s" dur="0.4s" fill="freeze"/></text>
        <text x="30" y="480" opacity="0"> TGAATCGATCGATTTACGATCGAAT <animate attributeName="opacity" to="1" begin="2.7s" dur="0.4s" fill="freeze"/></text>
      </g>
      <rect x="20" y="120" width="360" height="360" fill="none" stroke="rgba(37, 99, 235, 0.15)" stroke-width="1.5" rx="16"/>
      <circle cx="35" cy="135" r="4" fill="#EF4444" /><circle cx="47" cy="135" r="4" fill="#F59E0B" /><circle cx="59" cy="135" r="4" fill="#10B981" />
      <rect x="260" y="443" width="8" height="15" fill="#2563EB"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></rect>
    </g>
  </g>

  <!-- RIGHT SIDE: TERMINAL WINDOW -->
  <g transform="translate(480, 50)">
    <rect width="640" height="510" fill="url(#panel-grad)" rx="16" stroke="rgba(15,23,42,0.08)" stroke-width="1.5"/>
    <path d="M 0,25 Q 0,0 25,0 L 615,0 Q 640,0 640,25 L 640,45 L 0,45 Z" fill="#E2E8F0" opacity="0.9"/>
    <circle cx="25" cy="22" r="6" fill="#EF4444"/><circle cx="45" cy="22" r="6" fill="#F59E0B"/><circle cx="65" cy="22" r="6" fill="#10B981"/>
    <text x="320" y="26" fill="#475569" font-size="13" font-weight="600" text-anchor="middle" class="font-sans">jaemin@biocomputing:~</text>

    <g transform="translate(30, 85)">
      <text x="0" y="10" fill="#475569" font-size="18" font-weight="600" class="font-mono">&gt; identity --fetch</text>
      <g transform="translate(0, 45)">
        <text x="0" y="0" fill="#0F172A" font-size="36" font-weight="800" class="font-sans">Hello, I'm <tspan fill="url(#accent-grad)">Jaemin KIM</tspan></text>
      </g>

      <g transform="translate(0, 90)" class="font-mono" font-size="22" font-weight="700">
        <text x="0" y="0" fill="#0F172A">
          <tspan id="p1">
            <animate attributeName="opacity" values="1;1;0;0;0" dur="8s" repeatCount="indefinite" keyTimes="0;0.45;0.48;0.98;1"/>Bioinformatician</tspan>
          <tspan id="p2">
            <animate attributeName="opacity" values="0;0;1;1;0" dur="8s" repeatCount="indefinite" keyTimes="0;0.48;0.52;0.95;1"/>AI Engineer</tspan>
        </text>
        <rect x="210" y="-18" width="10" height="24" fill="#2563EB">
          <animate attributeName="x" values="210;210;140;140;210" dur="8s" repeatCount="indefinite" keyTimes="0;0.45;0.52;0.95;1"/>
          <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
        </rect>
      </g>

      <line x1="0" y1="120" x2="580" y2="120" stroke="rgba(15,23,42,0.06)" stroke-width="1"/>

      <g transform="translate(0, 155)" class="font-mono" font-size="15" fill="#0F172A">
        <g opacity="0"><animate attributeName="opacity" to="1" begin="1.2s" dur="0.4s" fill="freeze"/>
          <text x="0" y="0" fill="#2563EB" font-weight="700">Location:</text>
          <text x="140" y="0" class="font-sans" fill="#334155">Daejeon, South Korea</text>
        </g>
        <g opacity="0"><animate attributeName="opacity" to="1" begin="1.4s" dur="0.4s" fill="freeze"/>
          <text x="0" y="30" fill="#2563EB" font-weight="700">Education:</text>
          <text x="140" y="30" class="font-sans" fill="#334155">Chungnam National University</text>
        </g>
        <g opacity="0"><animate attributeName="opacity" to="1" begin="1.6s" dur="0.4s" fill="freeze"/>
          <text x="0" y="60" fill="#2563EB" font-weight="700">Focus:</text>
          <text x="140" y="60" class="font-sans" fill="#10B981" font-weight="600">Computational Biology</text>
        </g>
        <g opacity="0"><animate attributeName="opacity" to="1" begin="1.8s" dur="0.4s" fill="freeze"/>
          <text x="0" y="90" fill="#2563EB" font-weight="700">Portfolio:</text>
          <text x="140" y="90" class="font-sans" fill="#475569">https://kjamm.github.io/Blog/</text>
        </g>
        <g opacity="0"><animate attributeName="opacity" to="1" begin="2.0s" dur="0.4s" fill="freeze"/>
          <text x="0" y="120" fill="#2563EB" font-weight="700">Email:</text>
          <text x="140" y="120" class="font-sans" fill="#334155">jaemin5257@gmail.com</text>
        </g>
      </g>

      <g transform="translate(0, 315)">
        <text x="0" y="0" fill="#475569" font-size="14" font-weight="700" class="font-mono">&gt; core.skills</text>
        <g transform="translate(0, 15)" class="font-sans" font-size="13" font-weight="600" fill="#0F172A">
          <g transform="translate(0, 0)"><rect width="80" height="30" rx="8" class="pill"/><text x="40" y="19" text-anchor="middle">Python</text></g>
          <g transform="translate(90, 0)"><rect width="50" height="30" rx="8" class="pill"/><text x="25" y="19" text-anchor="middle">R</text></g>
          <g transform="translate(150, 0)"><rect width="80" height="30" rx="8" class="pill"/><text x="40" y="19" text-anchor="middle">Kotlin</text></g>
          <g transform="translate(240, 0)"><rect width="70" height="30" rx="8" class="pill"/><text x="35" y="19" text-anchor="middle">JAVA</text></g>
          <g transform="translate(320, 0)"><rect width="65" height="30" rx="8" class="pill"/><text x="32.5" y="19" text-anchor="middle">PHP</text></g>
          <g transform="translate(395, 0)"><rect width="75" height="30" rx="8" class="pill"/><text x="37.5" y="19" text-anchor="middle">Linux</text></g>
        </g>
      </g>
    </g>
  </g>
</svg>
